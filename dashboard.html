<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Productivity Dashboard</title>
    <style>
      :root {
        --bg: #f3f7fb;
        --panel: #ffffff;
        --text: #1f2734;
        --muted: #66758a;
        --border: #d6deeb;
        --accent: #0f6ad9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at 20% -10%, #dceaff, transparent 40%),
          radial-gradient(circle at 90% 10%, #e3f7e6, transparent 40%),
          var(--bg);
        color: var(--text);
        font-family: Segoe UI, Tahoma, sans-serif;
      }
      .container { max-width: 1080px; margin: 0 auto; padding: 18px; }
      .title { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      h1 { margin: 0; font-size: 28px; }
      .sub { color: var(--muted); font-size: 13px; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; margin-top: 14px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }
      .kpi { grid-column: span 3; }
      .chartWide { grid-column: span 8; }
      .chartNarrow { grid-column: span 4; }
      .insights { grid-column: span 12; }
      .full { grid-column: span 12; }
      .kpi .label { color: var(--muted); font-size: 12px; }
      .kpi .value { margin-top: 4px; font-size: 24px; font-weight: 700; }
      h2 { margin: 0 0 10px; font-size: 16px; }
      h3 { margin: 14px 0 8px; font-size: 14px; color: #374151; }
      .bars { display: grid; gap: 7px; }
      .barRow { display: grid; grid-template-columns: 180px 1fr 72px; gap: 8px; align-items: center; font-size: 13px; }
      .track { background: #eff3f9; border-radius: 999px; height: 10px; overflow: hidden; }
      .fill { background: linear-gradient(90deg, #2f7cf7, #6ba9ff); height: 100%; }
      .pie {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        margin: 8px auto;
        border: 1px solid var(--border);
      }
      .legend { display: grid; gap: 4px; font-size: 13px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
      .insights ul { margin: 0; padding-left: 18px; display: grid; gap: 6px; }
      .insights ol { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
      .insights li ul { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 4px; }
      button {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        color: var(--text);
        padding: 9px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
      .status { font-size: 12px; color: var(--muted); margin-top: 8px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 7px; border-bottom: 1px solid var(--border); }
      .over { color: #b42318; font-weight: 700; }
      @media (max-width: 900px) {
        .kpi, .chartWide, .chartNarrow, .insights, .full { grid-column: span 12; }
        .barRow { grid-template-columns: 130px 1fr 58px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="title">
        <div>
          <h1>Productivity Dashboard</h1>
          <div class="sub" id="dateLabel"></div>
        </div>
        <div class="actions">
          <button id="openSettings">Settings</button>
          <button id="refresh" class="primary">Refresh</button>
        </div>
      </div>

      <div class="grid">
        <div class="card kpi"><div class="label">Today total</div><div class="value" id="kpiTotal">0m</div></div>
        <div class="card kpi"><div class="label">Productive</div><div class="value" id="kpiProductive">0m</div></div>
        <div class="card kpi"><div class="label">Distracting</div><div class="value" id="kpiDistracting">0m</div></div>
        <div class="card kpi"><div class="label">Week total</div><div class="value" id="kpiWeek">0m</div></div>

        <div class="card chartWide">
          <h2>Top sites today</h2>
          <div class="bars" id="domainBars"></div>
        </div>

        <div class="card chartNarrow">
          <h2>Category split today</h2>
          <div class="pie" id="categoryPie"></div>
          <div class="legend" id="categoryLegend"></div>
        </div>

        <div class="card insights">
          <h2>Insights</h2>
          <div class="actions" style="margin-bottom: 8px;">
            <button id="generateAiInsights">Generate AI insights</button>
          </div>
          <ul id="insights"></ul>
        </div>

        <div class="card full">
          <h2>Daily limits status</h2>
          <table>
            <thead>
              <tr><th>Limit</th><th>Used</th><th>Max</th><th>Status</th></tr>
            </thead>
            <tbody id="limitsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
